name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check — API
        run: pnpm --filter @nasaq/api exec tsc --noEmit
      - name: TypeScript check — Dashboard
        run: pnpm --filter dashboard exec tsc --noEmit

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -p "${SSH_PORT:-22}" \
              "${SSH_USER:-root}@tarmizos.com" \
              'set -e
               cd /var/www/nasaq
               git fetch origin main
               git reset --hard origin/main
               git clean -fd
               pnpm install --frozen-lockfile
               pnpm --filter @nasaq/db run migrate
               pnpm --filter @nasaq/dashboard build:deploy
               pm2 start ecosystem.config.cjs --update-env
               pm2 save
               pm2 status'
          rm -f /tmp/deploy_key
