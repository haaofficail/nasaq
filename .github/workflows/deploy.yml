name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TypeScript check — API
        run: pnpm --filter @nasaq/api exec tsc --noEmit
      - name: TypeScript check — Dashboard
        run: pnpm --filter dashboard exec tsc --noEmit

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/nasaq
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            pnpm install --frozen-lockfile
            pnpm --filter @nasaq/db tsx scripts/migrate.ts
            pnpm --filter @nasaq/dashboard build
            pm2 restart nasaq-api
            pm2 status
