              '104_service_order_applied_template.sql','105_event_package_item_task_type.sql',
              '106_master_template_registry.sql','107_flower_builder_images.sql',
              '108_compliance_layer.sql','109_booking_consent_privacy_public.sql',
              '110_service_order_kind.sql','111_canonical_booking_completion.sql',
              '112_order_flow_hardening.sql','113_service_orders_hardening.sql',
              '114_online_orders_financial_integrity.sql','115_service_orders_rental_support.sql',
              '116_admin_wa_gateway.sql','117_flower_operational_hardening.sql',
              '118_otp_email_support.sql','119_enforce_service_duration.sql',
              '120_salon_monitoring_events.sql','121_must_change_password.sql',
              '122_pos_transactions_indexes.sql','123_pos_transaction_number_unique.sql',
              '124_services_min_price.sql','125_referral_system.sql',
              '126_menu_tables.sql','127_extended_modules_schema.sql',
              '128_fix_client_salon_profile_fk.sql','129_restore_missing_tables.sql',
              '130_seed_admin_user.sql','131_restore_missing_tables_2.sql',
              '132_contracts_v2.sql','133_inventory_products.sql',
              '134_admin_wa_invite.sql','135_bookings_rebooking_index.sql',
              '136_pipeline_mapped_status.sql','137_pipeline_backfill_and_hardening.sql',
              '138_pos_transactions_table.sql','139_pos_quick_items_table.sql',
              '140_bookings_performance_indexes.sql','141_flowers_events_vertical.sql',
              '142_page_builder_v2.sql','142_page_builder_v2_rollback.sql'
            ]) AS f
            ON CONFLICT DO NOTHING;
          "

      - name: Apply new migrations (143+)
        working-directory: packages/db
        run: pnpm tsx scripts/migrate.ts

      - name: Run tests
        working-directory: packages/api
        run: pnpm test
