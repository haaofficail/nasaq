<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>نظام ترميز OS</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="apple-touch-icon" href="/favicon.svg?v=2">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#5b9bd5">
  <!-- Theme cache: يُطبَّق قبل React لمنع flash الأزرق → الوردي -->
  <script>
    (function(){
      try {
        var t = JSON.parse(localStorage.getItem('nasaq_theme_cache') || 'null');
        if (!t || !t.p) return;
        var r = document.documentElement, p = t.p, s = t.s || p;
        r.style.setProperty('--brand-primary',       p);
        r.style.setProperty('--brand-primary-hover',  t.h  || p);
        r.style.setProperty('--brand-primary-dark',   t.d  || p);
        r.style.setProperty('--brand-primary-soft',   t.sf || '#EBF3FB');
        r.style.setProperty('--brand-primary-light',  t.l  || '#EBF3FB');
        r.style.setProperty('--brand-primary-200',    t.c2 || '#ADCFEF');
        r.style.setProperty('--brand-primary-300',    t.c3 || '#85B7E7');
        r.style.setProperty('--brand-primary-400',    t.c4 || p);
        r.style.setProperty('--brand-primary-700',    t.c7 || p);
        r.style.setProperty('--brand-primary-focus',  p + '40');
        r.style.setProperty('--brand-secondary',      s);
        r.style.setProperty('--nasaq-primary',        p);
        r.style.setProperty('--sys-brand',            p);
        if (t.f) r.style.setProperty('--nasaq-font-family', t.f);
      } catch(e) {}
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-50 font-sans antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
